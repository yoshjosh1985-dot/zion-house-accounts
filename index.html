<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HouseBank Premium AI 4.0</title>
    
    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Use Lucide React instead of core Lucide for better compatibility -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-scan {
            background: linear-gradient(to bottom, transparent 0%, rgba(79, 70, 229, 0.2) 50%, transparent 100%);
            background-size: 100% 200%;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            from { background-position: 0 -100%; }
            to { background-position: 0 100%; }
        }

        @keyframes infinite-loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .animate-infinite-loading {
            animation: infinite-loading 1.5s infinite linear;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, writeBatch, updateDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // Constants
        const LEDGERS = { HOUSEHOLD: 'household', FIXED_COSTS: 'fixed_costs' };
        const CATEGORIES = {
            [LEDGERS.HOUSEHOLD]: ['Groceries', 'Dining Out', 'Household Items', 'Entertainment', 'Transport', 'Healthcare', 'Gifts', 'Miscellaneous'],
            [LEDGERS.FIXED_COSTS]: ['Rent/Mortgage', 'Electricity', 'Water/Gas', 'Internet', 'Insurance', 'Phone Bill', 'Subscriptions', 'Council Rates']
        };

        /**
         * Robust Icon Component
         * Mapping string names to Lucide components provided by lucide-react UMD
         */
        const Icon = ({ name, size = 16, className = "", strokeWidth = 2 }) => {
            // In the UMD build, icons are under LucideReact
            const LucideIcon = window.LucideReact ? window.LucideReact[name] : null;

            if (!LucideIcon) {
                return <span style={{ width: size, height: size, display: 'inline-block' }} className={className} />;
            }

            return <LucideIcon size={size} className={className} strokeWidth={strokeWidth} />;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [activeLedger, setActiveLedger] = useState(LEDGERS.HOUSEHOLD);
            const [transactions, setTransactions] = useState([]);
            const [deposits, setDeposits] = useState([]);
            const [lineItems, setLineItems] = useState([]);
            
            const [isAdding, setIsAdding] = useState(false);
            const [isAddingDeposit, setIsAddingDeposit] = useState(false);
            const [loading, setLoading] = useState(true);
            const [aiProcessing, setAiProcessing] = useState(false);
            const [scanError, setScanError] = useState(null);
            const [globalSearch, setGlobalSearch] = useState('');

            const [billSplits, setBillSplits] = useState([{ person: '', amount: '', paid: false }]);
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                description: '',
                amount: '',
                category: CATEGORIES[LEDGERS.HOUSEHOLD][0],
                items: []
            });

            // Firebase Access
            const { 
                initializeApp, getAuth, onAuthStateChanged, signInAnonymously, 
                signInWithCustomToken, getFirestore, collection, onSnapshot, 
                addDoc, deleteDoc, doc, writeBatch, updateDoc 
            } = window.FirebaseSDK;

            const firebaseConfig = JSON.parse(__firebase_config);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'housebank-v4-premium';
            const apiKey = ""; 

            const app = useMemo(() => initializeApp(firebaseConfig), []);
            const auth = useMemo(() => getAuth(app), [app]);
            const db = useMemo(() => getFirestore(app), [app]);

            // Auth Initialization
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error("Auth Error:", err); }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, (u) => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsub();
            }, [auth]);

            // Data Sync
            useEffect(() => {
                if (!user) return;

                const tPath = collection(db, 'artifacts', appId, 'public', 'data', `transactions_${activeLedger}`);
                const dPath = collection(db, 'artifacts', appId, 'public', 'data', `deposits_${activeLedger}`);
                const iPath = collection(db, 'artifacts', appId, 'public', 'data', `items_${activeLedger}`);

                const unsubT = onSnapshot(tPath, (s) => {
                    setTransactions(s.docs.map(d => ({ ...d.data(), id: d.id, type: 'expense' })));
                }, (err) => console.error("T Sync Error:", err));

                const unsubD = onSnapshot(dPath, (s) => {
                    setDeposits(s.docs.map(d => ({ ...d.data(), id: d.id, type: 'deposit' })));
                }, (err) => console.error("D Sync Error:", err));

                const unsubI = onSnapshot(iPath, (s) => {
                    setLineItems(s.docs.map(d => ({ ...d.data(), id: d.id })));
                }, (err) => console.error("I Sync Error:", err));

                return () => { unsubT(); unsubD(); unsubI(); };
            }, [user, activeLedger, db]);

            const filteredData = useMemo(() => {
                const combined = [...transactions, ...deposits];
                let result = combined;
                if (globalSearch) {
                    const s = globalSearch.toLowerCase();
                    result = result.filter(i => (i.description?.toLowerCase() || "").includes(s));
                }
                return result.sort((a, b) => (b.ts || 0) - (a.ts || 0));
            }, [transactions, deposits, globalSearch]);

            const stats = useMemo(() => {
                const expenses = transactions.reduce((a, c) => a + (Number(c.amount) || 0), 0);
                const income = deposits.reduce((a, c) => a + (Number(c.amount) || 0), 0);
                return { 
                    balance: income - expenses, 
                    totalExpenses: expenses, 
                    totalIncome: income, 
                    count: transactions.length + deposits.length 
                };
            }, [transactions, deposits]);

            const reports = useMemo(() => {
                const shopMap = {};
                const itemMap = {};
                lineItems.forEach(item => {
                    const shop = item.merchant || 'Unknown Shop';
                    if (!shopMap[shop]) shopMap[shop] = { total: 0, count: 0 };
                    shopMap[shop].total += (Number(item.price) || 0);
                    shopMap[shop].count += 1;

                    const name = item.name?.toLowerCase().trim() || 'Unnamed Item';
                    if (!itemMap[name]) itemMap[name] = { total: 0, count: 0 };
                    itemMap[name].total += (Number(item.price) || 0);
                    itemMap[name].count += 1;
                });
                return {
                    shops: Object.entries(shopMap).sort((a, b) => b[1].total - a[1].total),
                    items: Object.entries(itemMap).sort((a, b) => b[1].count - a[1].count)
                };
            }, [lineItems]);

            const handleSaveExpense = async (e) => {
                if (e) e.preventDefault();
                if (!user) return;
                
                const cleanSplits = activeLedger === LEDGERS.FIXED_COSTS 
                    ? billSplits.filter(s => s.person && s.amount).map(s => ({ ...s, amount: parseFloat(s.amount), paid: false }))
                    : [];

                const transData = { 
                    ...formData, 
                    amount: parseFloat(formData.amount) || 0, 
                    ts: Date.now(), 
                    userId: user.uid,
                    splits: cleanSplits
                };

                try {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `transactions_${activeLedger}`), transData);
                    
                    if (formData.items?.length > 0) {
                        const batch = writeBatch(db);
                        formData.items.forEach(item => {
                            const iRef = doc(collection(db, 'artifacts', appId, 'public', 'data', `items_${activeLedger}`));
                            batch.set(iRef, { 
                                ...item, 
                                transactionId: docRef.id, 
                                merchant: formData.description, 
                                date: formData.date, 
                                ts: Date.now(),
                                price: parseFloat(item.price) || 0
                            });
                        });
                        await batch.commit();
                    }
                    setIsAdding(false);
                    setFormData({ date: new Date().toISOString().split('T')[0], description: '', amount: '', category: CATEGORIES[activeLedger][0], items: [] });
                    setBillSplits([{ person: '', amount: '', paid: false }]);
                } catch (err) { console.error("Save failed:", err); }
            };

            const toggleSplitPaid = async (transId, splitIndex) => {
                const trans = transactions.find(t => t.id === transId);
                if (!trans || !trans.splits) return;
                const newSplits = [...trans.splits];
                newSplits[splitIndex].paid = !newSplits[splitIndex].paid;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `transactions_${activeLedger}`, transId), { splits: newSplits });
            };

            const runAiScanner = async (file) => {
                if (!file) return;
                setAiProcessing(true);
                setScanError(null);
                
                try {
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    const prompt = `Extract: merchant, total amount, category (${CATEGORIES[activeLedger].join(', ')}), date (YYYY-MM-DD), and line items (name/price array). JSON only.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: file.type, data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    const extracted = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    
                    setFormData(prev => ({
                        ...prev,
                        description: extracted.merchant || extracted.store || prev.description,
                        amount: String(extracted.amount || extracted.total).replace(/[^0-9.]/g, '') || prev.amount,
                        date: extracted.date || prev.date,
                        items: (extracted.items || []).map(it => ({ ...it, price: String(it.price).replace(/[^0-9.]/g, '') }))
                    }));
                } catch (err) { 
                    setScanError("AI scan failed. Please check image quality."); 
                    console.error("AI Error:", err);
                }
                finally { setAiProcessing(false); }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="text-[10px] font-black tracking-[0.5em] uppercase animate-pulse mb-4">Initializing Secure Environment</div>
                    <div className="w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div className="w-1/2 h-full bg-indigo-500 animate-infinite-loading"></div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-[#F8FAFC] text-slate-900 font-sans overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-80 bg-white border-r flex flex-col shrink-0">
                        <div className="flex-1 overflow-y-auto p-8 no-scrollbar">
                            <div className="flex items-center space-x-3 mb-10">
                                <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100">
                                    <Icon name="Wallet" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tighter uppercase leading-none">HouseBank</h1>
                                    <span className="text-[9px] font-black text-indigo-500 uppercase tracking-[0.2em]">Premium AI 4.0</span>
                                </div>
                            </div>
                            
                            <nav className="space-y-1">
                                <SidebarBtn active={view === 'dashboard'} icon="LayoutDashboard" label="Dashboard" onClick={() => setView('dashboard')} />
                                <SidebarBtn active={view === 'ledger'} icon="Receipt" label="Ledger" onClick={() => setView('ledger')} />
                                <SidebarBtn active={view === 'items'} icon="ShoppingBag" label="Line Items" onClick={() => setView('items')} />
                                <SidebarBtn active={view === 'reports'} icon="BarChart3" label="Insights" onClick={() => setView('reports')} />
                                
                                <div className="pt-8 pb-3 text-[10px] font-black uppercase tracking-widest text-slate-400 px-4">Managed Ledgers</div>
                                <div className="space-y-2">
                                    <LedgerTab active={activeLedger === LEDGERS.HOUSEHOLD} label="Household Expenses" onClick={() => setActiveLedger(LEDGERS.HOUSEHOLD)} />
                                    <LedgerTab active={activeLedger === LEDGERS.FIXED_COSTS} label="Fixed Utilities" onClick={() => setActiveLedger(LEDGERS.FIXED_COSTS)} />
                                </div>
                            </nav>
                        </div>
                        
                        <div className="shrink-0 p-8 border-t bg-slate-50/50">
                            <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-xl">
                                <p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Current Ledger Net</p>
                                <p className={`text-2xl font-black ${stats.balance < 0 ? 'text-red-400' : 'text-emerald-400'}`}>
                                    ${stats.balance.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                                </p>
                            </div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-24 bg-white border-b flex items-center justify-between px-10 shrink-0">
                            <div className="flex items-center space-x-4">
                                <div className="bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100">
                                    <span className="text-[10px] font-black uppercase text-indigo-500 tracking-widest">{activeLedger.replace('_', ' ')}</span>
                                </div>
                                <div className="relative w-64">
                                    <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={16} />
                                    <input type="text" placeholder="Global search..." className="w-full bg-slate-50 rounded-xl py-2.5 pl-10 pr-4 text-xs font-bold outline-none focus:ring-2 focus:ring-indigo-100" value={globalSearch} onChange={e => setGlobalSearch(e.target.value)} />
                                </div>
                            </div>
                            <div className="flex items-center space-x-3">
                                <button onClick={() => setIsAddingDeposit(true)} className="bg-emerald-50 text-emerald-600 p-3 rounded-xl hover:bg-emerald-100 transition-all"><Icon name="ArrowUpCircle" size={20} /></button>
                                <button onClick={() => { setIsAdding(true); setScanError(null); }} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg flex items-center space-x-2">
                                    <Icon name="Plus" size={16} strokeWidth={3} /><span>Add Transaction</span>
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-10 no-scrollbar">
                            {view === 'dashboard' && (
                                <div className="space-y-10">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <StatCard label="Total Out" value={stats.totalExpenses} icon="TrendingUp" color="indigo" />
                                        <StatCard label="Total In" value={stats.totalIncome} icon="CreditCard" color="emerald" />
                                        <StatCard label="Activity Count" value={stats.count} icon="Activity" color="amber" isCurrency={false} />
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6 px-2">Recent Timeline</h3>
                                        <div className="divide-y">
                                            {filteredData.slice(0, 8).map(i => (
                                                <div key={i.id} className="py-5 flex justify-between items-center group px-2">
                                                    <div className="flex items-center space-x-4">
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm ${i.type === 'deposit' ? 'bg-emerald-50 text-emerald-500' : 'bg-slate-50 text-slate-400'}`}>
                                                            {i.type === 'deposit' ? '$' : '🏷️'}
                                                        </div>
                                                        <div>
                                                            <p className="font-black text-sm text-slate-800">{i.description}</p>
                                                            <p className="text-[9px] font-bold text-slate-400 uppercase">{i.date} • {i.category || 'Credit'}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`font-black text-sm ${i.type === 'expense' ? 'text-slate-900' : 'text-emerald-600'}`}>
                                                        {i.type === 'expense' ? '-' : '+'}${Number(i.amount).toFixed(2)}
                                                    </p>
                                                </div>
                                            ))}
                                            {filteredData.length === 0 && (
                                                <div className="py-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">No history found</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'ledger' && (
                                <div className="bg-white rounded-[2rem] border shadow-sm overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b">
                                            <tr>
                                                <th className="px-8 py-5">Date</th>
                                                <th className="px-8 py-5">Merchant / Details</th>
                                                <th className="px-8 py-5">Amount</th>
                                                <th className="px-8 py-5 text-right">Delete</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {filteredData.map(i => (
                                                <tr key={i.id} className="group hover:bg-slate-50/50">
                                                    <td className="px-8 py-5 text-[11px] font-bold text-slate-400">{i.date}</td>
                                                    <td className="px-8 py-5">
                                                        <div className="flex flex-col space-y-2">
                                                            <span className="text-[13px] font-black text-slate-800 uppercase tracking-tight">{i.description}</span>
                                                            {i.splits && i.splits.length > 0 && (
                                                                <div className="flex flex-wrap gap-2">
                                                                    {i.splits.map((s, idx) => (
                                                                        <button key={idx} onClick={() => toggleSplitPaid(i.id, idx)} className={`flex items-center space-x-1 px-2 py-1 rounded-lg text-[9px] font-black uppercase border transition-all ${s.paid ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-white border-slate-200 text-slate-400 hover:border-indigo-300'}`}>
                                                                            <Icon name={s.paid ? "CheckCircle2" : "Circle"} size={10} />
                                                                            <span>{s.person}: ${s.amount}</span>
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="px-8 py-5">
                                                        <span className={`text-[15px] font-black ${i.type === 'expense' ? 'text-slate-900' : 'text-emerald-600'}`}>
                                                            {i.type === 'expense' ? '-' : '+'}${Number(i.amount).toFixed(2)}
                                                        </span>
                                                    </td>
                                                    <td className="px-8 py-5 text-right">
                                                        <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `${i.type === 'expense' ? 'transactions' : 'deposits'}_${activeLedger}`, i.id))} className="text-slate-200 hover:text-red-500"><Icon name="Trash2" size={16} /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {view === 'items' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {lineItems.map(li => (
                                        <div key={li.id} className="bg-white p-6 rounded-3xl border shadow-sm group hover:shadow-lg transition-all">
                                            <div className="flex justify-between items-start mb-3">
                                                <p className="text-[9px] font-black text-indigo-500 uppercase tracking-widest">{li.merchant}</p>
                                                <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `items_${activeLedger}`, li.id))} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500"><Icon name="X" size={12}/></button>
                                            </div>
                                            <h4 className="text-sm font-black text-slate-800 mb-2 truncate">{li.name}</h4>
                                            <p className="text-2xl font-black tracking-tighter">${Number(li.price || 0).toFixed(2)}</p>
                                            <p className="text-[9px] font-bold text-slate-300 mt-4 uppercase">{li.date}</p>
                                        </div>
                                    ))}
                                    {lineItems.length === 0 && (
                                        <div className="col-span-full py-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">No line items stored</div>
                                    )}
                                </div>
                            )}

                            {view === 'reports' && (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 mb-8 flex items-center gap-2"><Icon name="Store" size={18}/> Top Shops</h3>
                                        <div className="space-y-4">
                                            {reports.shops.length > 0 ? reports.shops.map(([shop, data]) => (
                                                <div key={shop} className="flex items-center justify-between">
                                                    <div className="flex-1">
                                                        <p className="text-sm font-black text-slate-800">{shop}</p>
                                                        <div className="w-full bg-slate-50 h-1.5 rounded-full mt-2 overflow-hidden">
                                                            <div className="bg-indigo-500 h-full" style={{ width: `${Math.min(100, (data.total / (stats.totalExpenses || 1)) * 100)}%` }}></div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right pl-6"><p className="text-sm font-black">${data.total.toFixed(2)}</p></div>
                                                </div>
                                            )) : <p className="text-center py-10 text-[10px] text-slate-300 font-black">Not enough data</p>}
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 mb-8 flex items-center gap-2"><Icon name="Tag" size={18}/> Top Bought Items</h3>
                                        <div className="space-y-4">
                                            {reports.items.length > 0 ? reports.items.slice(0, 10).map(([item, data]) => (
                                                <div key={item} className="flex items-center justify-between p-3 rounded-2xl hover:bg-slate-50 transition-colors">
                                                    <p className="text-sm font-black text-slate-800 capitalize">{item}</p>
                                                    <div className="flex items-center gap-4">
                                                        <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg text-[10px] font-black tracking-tighter">{data.count}x</span>
                                                        <p className="text-sm font-black w-16 text-right">${data.total.toFixed(2)}</p>
                                                    </div>
                                                </div>
                                            )) : <p className="text-center py-10 text-[10px] text-slate-300 font-black">Not enough data</p>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modals */}
                    {isAdding && (
                        <Modal title={`Add to ${activeLedger.split('_')[0]}`} onClose={() => setIsAdding(false)}>
                            <div className="space-y-6 max-h-[70vh] overflow-y-auto pr-2 no-scrollbar">
                                <div className={`h-28 border-2 border-dashed rounded-3xl flex flex-col items-center justify-center relative overflow-hidden ${aiProcessing ? 'bg-indigo-50 border-indigo-200 animate-scan' : 'bg-slate-50 border-slate-100'}`}>
                                    <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={e => runAiScanner(e.target.files[0])} />
                                    {aiProcessing ? <Icon name="Loader2" className="animate-spin text-indigo-500" /> : <Icon name="Camera" className="text-slate-300" />}
                                    <p className="text-[10px] font-black text-indigo-500 uppercase mt-2">{aiProcessing ? 'AI Processing...' : 'Scan Receipt'}</p>
                                </div>
                                {scanError && <div className="p-4 bg-red-50 text-red-600 rounded-2xl text-[10px] font-bold text-center">⚠️ {scanError}</div>}
                                <form onSubmit={handleSaveExpense} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <Input label="Date" type="date" value={formData.date} onChange={v => setFormData({...formData, date: v})} />
                                        <Input label="Total ($)" type="number" step="0.01" value={formData.amount} onChange={v => setFormData({...formData, amount: v})} />
                                    </div>
                                    <Input label="Merchant" value={formData.description} onChange={v => setFormData({...formData, description: v})} />
                                    
                                    {formData.items.length > 0 && (
                                        <div className="bg-indigo-50/50 p-4 rounded-2xl space-y-2 border border-indigo-100">
                                            <p className="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Extracted Items</p>
                                            {formData.items.map((it, idx) => (
                                                <div key={idx} className="flex justify-between text-[10px] font-bold text-slate-600">
                                                    <span className="truncate flex-1">{it.name}</span>
                                                    <span className="shrink-0">${Number(it.price).toFixed(2)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {activeLedger === LEDGERS.FIXED_COSTS && (
                                        <div className="pt-4 border-t space-y-3">
                                            <div className="flex justify-between items-center">
                                                <label className="text-[9px] font-black uppercase text-indigo-600 tracking-widest">Split Billing</label>
                                                <button type="button" onClick={() => setBillSplits([...billSplits, { person: '', amount: '', paid: false }])} className="text-[9px] font-black text-indigo-400">+ Add</button>
                                            </div>
                                            {billSplits.map((s, idx) => (
                                                <div key={idx} className="flex gap-2">
                                                    <input placeholder="Name" className="flex-1 p-3 bg-slate-50 rounded-xl text-[11px] font-bold outline-none" value={s.person} onChange={e => { const n = [...billSplits]; n[idx].person = e.target.value; setBillSplits(n); }} />
                                                    <input placeholder="$" type="number" className="w-24 p-3 bg-slate-50 rounded-xl text-[11px] font-bold outline-none" value={s.amount} onChange={e => { const n = [...billSplits]; n[idx].amount = e.target.value; setBillSplits(n); }} />
                                                    <button type="button" onClick={() => setBillSplits(billSplits.filter((_, i) => i !== idx))} className="p-3 text-slate-300 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] shadow-xl">Confirm & Save</button>
                                </form>
                            </div>
                        </Modal>
                    )}

                    {isAddingDeposit && (
                        <Modal title="Add Income" onClose={() => setIsAddingDeposit(false)}>
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                const amount = parseFloat(e.target.amount.value) || 0;
                                const desc = e.target.desc.value;
                                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `deposits_${activeLedger}`), {
                                    amount, description: desc, date: new Date().toISOString().split('T')[0], ts: Date.now(), userId: user.uid
                                });
                                setIsAddingDeposit(false);
                            }} className="space-y-4">
                                <Input name="amount" label="Amount ($)" type="number" step="0.01" required />
                                <Input name="desc" label="Source" required />
                                <button type="submit" className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase tracking-widest text-[10px]">Record Income</button>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        const SidebarBtn = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} className={`flex items-center space-x-3 w-full p-3.5 rounded-xl transition-all ${active ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50 font-bold'}`}>
                <Icon name={icon} size={16} /> <span className="text-[10px] font-black uppercase tracking-widest">{label}</span>
            </button>
        );

        const LedgerTab = ({ active, label, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center justify-between p-3.5 rounded-xl border transition-all ${active ? 'border-indigo-600 bg-indigo-50/20' : 'border-transparent bg-slate-50'}`}>
                <span className={`text-[10px] font-black uppercase ${active ? 'text-indigo-900' : 'text-slate-500'}`}>{label}</span>
                {active && <Icon name="ChevronRight" size={12} className="text-indigo-600" />}
            </button>
        );

        const StatCard = ({ label, value, icon, color, isCurrency = true }) => {
            const colors = { indigo: 'bg-indigo-50 text-indigo-600', emerald: 'bg-emerald-50 text-emerald-600', amber: 'bg-amber-50 text-amber-600' };
            return (
                <div className="bg-white p-6 rounded-3xl border shadow-sm flex items-center space-x-5">
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${colors[color]}`}><Icon name={icon} size={24} /></div>
                    <div>
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{label}</p>
                        <p className="text-xl font-black tracking-tighter">{isCurrency && '$'}{(value || 0).toLocaleString(undefined, { minimumFractionDigits: isCurrency ? 2 : 0 })}</p>
                    </div>
                </div>
            );
        };

        const Modal = ({ title, children, onClose }) => (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-[2.5rem] w-full max-w-md shadow-2xl overflow-hidden">
                    <div className="p-6 border-b flex justify-between items-center px-8">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="X" size={18}/></button>
                    </div>
                    <div className="p-8">{children}</div>
                </div>
            </div>
        );

        const Input = ({ label, onChange, ...props }) => (
            <div className="space-y-1">
                <label className="text-[9px] font-black uppercase text-slate-400 px-2 tracking-widest">{label}</label>
                <input {...props} onChange={e => onChange ? onChange(e.target.value) : null} className="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs outline-none border-none focus:ring-2 focus:ring-indigo-100" />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
