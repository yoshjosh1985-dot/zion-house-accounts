<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <title>HouseBank | AI Stabilized</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-scan { background: linear-gradient(to bottom, transparent 0%, rgba(79, 70, 229, 0.4) 50%, transparent 100%); background-size: 100% 200%; animation: scan 2s linear infinite; }
        @keyframes scan { from { background-position: 0 -100%; } to { background-position: 0 100%; } }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Global Constants
        const firebaseConfig = {
            apiKey: "AIzaSyA53SpP4BQ3kU325m8PL3-7rY7iUTfp45s",
            authDomain: "home-accounting-2463d.firebaseapp.com",
            projectId: "home-accounting-2463d",
            storageBucket: "home-accounting-2463d.appspot.com",
            messagingSenderId: "645556460544",
            appId: "1:645556460544:web:f7d822278af64654918ce5"
        };

        const DEFAULT_APP_ID = 'home-accounting-2463d';
        const FALLBACK_API_KEY = firebaseConfig.apiKey || ""; // Uses project key unless overridden at runtime
        const runtimeConfig = (() => {
            const params = new URLSearchParams(window.location.search);
            const urlApiKey = params.get('apiKey');
            const urlAppId = params.get('appId');
            if (urlApiKey) localStorage.setItem('housebank_api_key', urlApiKey);
            if (urlAppId) localStorage.setItem('housebank_app_id', urlAppId);
            return {
                apiKey: urlApiKey || window.__apiKey || localStorage.getItem('housebank_api_key') || FALLBACK_API_KEY,
                appId: urlAppId || localStorage.getItem('housebank_app_id') || DEFAULT_APP_ID
            };
        })();
        const appId = runtimeConfig.appId;
        const apiKey = runtimeConfig.apiKey;

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const LEDGERS = { HOUSEHOLD: 'household', FIXED_COSTS: 'fixed_costs' };
        const CATEGORIES = {
            [LEDGERS.HOUSEHOLD]: ['Groceries', 'Household Items', 'Dining Out', 'Cleaning', 'Toiletries', 'Miscellaneous'],
            [LEDGERS.FIXED_COSTS]: ['Rent/Mortgage', 'Electricity', 'Water', 'Internet', 'Insurance', 'Phone Bill']
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('dashboard');
            const [activeLedger, setActiveLedger] = React.useState(LEDGERS.HOUSEHOLD);
            const [transactions, setTransactions] = React.useState([]);
            const [deposits, setDeposits] = React.useState([]);
            const [allLineItems, setAllLineItems] = React.useState([]);
            const [utilityBills, setUtilityBills] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [aiProcessing, setAiProcessing] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState(null);
            const [activeModal, setActiveModal] = React.useState(null);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [searchItem, setSearchItem] = React.useState('');
            const [reportFilters, setReportFilters] = React.useState(() => {
                const today = new Date();
                const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
                const todayIso = today.toISOString().split('T')[0];
                return { startDate: monthStart, endDate: todayIso, category: 'all', shop: 'all', contributor: 'all', minAmount: '', maxAmount: '' };
            });

            const [formData, setFormData] = React.useState({
                date: new Date().toISOString().split('T')[0],
                description: '', amount: '', category: 'Groceries', contributor: '', targetBill: '', receiptUrl: '', shopName: '', lineItems: []
            });

            const [utilityForm, setUtilityForm] = React.useState({
                name: '',
                amount: '',
                people: '2',
                paid: '',
                dueDate: new Date().toISOString().split('T')[0]
            });

            React.useEffect(() => {
                const initAuth = async () => {
                    try {
                        await firebase.auth().signInAnonymously();
                    } catch (e) {
                        console.error("Auth failed", e);
                    }
                };
                initAuth();
                const unsubscribe = firebase.auth().onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const db = firebase.firestore();
                const transPath = `artifacts/${appId}/public/data/transactions_${activeLedger}`;
                const depPath = `artifacts/${appId}/public/data/deposits_${activeLedger}`;
                const itemsPath = `artifacts/${appId}/public/data/line_items_${activeLedger}`;
                const utilityPath = `artifacts/${appId}/public/data/utility_bills_${activeLedger}`;

                const unsubT = db.collection(transPath).onSnapshot(s => setTransactions(s.docs.map(d => ({ ...d.data(), id: d.id, type: 'expense' }))), err => console.error(err));
                const unsubD = db.collection(depPath).onSnapshot(s => setDeposits(s.docs.map(d => ({ ...d.data(), id: d.id, type: 'deposit' }))), err => console.error(err));
                const unsubI = db.collection(itemsPath).onSnapshot(s => setAllLineItems(s.docs.map(d => ({ ...d.data(), id: d.id }))), err => console.error(err));
                const unsubU = db.collection(utilityPath).onSnapshot(s => setUtilityBills(s.docs.map(d => ({ ...d.data(), id: d.id }))), err => console.error(err));

                return () => { unsubT(); unsubD(); unsubI(); unsubU(); };
            }, [user, activeLedger]);

            const stats = React.useMemo(() => {
                const totalEx = transactions.reduce((a, c) => a + (Number(c.amount) || 0), 0);
                const totalDep = deposits.reduce((a, c) => a + (Number(c.amount) || 0), 0);
                const billProgress = transactions.reduce((acc, t) => {
                    const deps = deposits.filter(d => d.targetBill === t.id);
                    const paid = deps.reduce((a, c) => a + c.amount, 0);
                    acc[t.id] = { total: t.amount, paid, remaining: Math.max(0, t.amount - paid) };
                    return acc;
                }, {});
                return { balance: totalDep - totalEx, billProgress };
            }, [transactions, deposits]);

            const runAiScanner = async (file) => {
                if (!file) return;
                setAiProcessing(true);
                setErrorMsg(null);

                // 1. Initial Check for API Key
                if (!apiKey && typeof __apiKey === 'undefined' && !localStorage.getItem('housebank_api_key')) {
                    // Fallback: wait a moment for environment injection if this is first run
                    await new Promise(r => setTimeout(r, 1000));
                }

                try {
                    // Storage Upload
                    const storageRef = firebase.storage().ref().child(`receipts/${Date.now()}_${file.name}`);
                    const uploadTask = await storageRef.put(file);
                    const downloadUrl = await uploadTask.ref.getDownloadURL();

                    // Read File for AI
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    // API Call with retries + model fallback
                    const callGemini = async () => {
                        const actualKey = apiKey || window.__apiKey || localStorage.getItem('housebank_api_key') || "";
                        if (!actualKey) throw new Error("API Key not initialized. Add ?apiKey=YOUR_KEY to the URL.");

                        const prompt = [
                            "You are parsing a grocery receipt image.",
                            "Return ONLY valid JSON with this shape:",
                            '{"shopName":"", "description":"", "amount":0, "category":"Groceries", "items":[{"name":"", "price":0, "category":""}]}',
                            "Rules:",
                            "- amount must be numeric (the grand total)",
                            "- items price must be numeric",
                            "- if unknown, use empty string"
                        ].join("\n");

                        const models = ["gemini-1.5-flash-latest", "gemini-1.5-pro-latest"];
                        let lastError = "";

                        for (const model of models) {
                            for (let attempt = 0; attempt < 3; attempt++) {
                                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${actualKey}`, {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({
                                        contents: [{
                                            parts: [
                                                { text: prompt },
                                                { inlineData: { mimeType: file.type, data: base64Data } }
                                            ]
                                        }],
                                        generationConfig: { temperature: 0.1 }
                                    })
                                });

                                if (response.ok) {
                                    return response.json();
                                }

                                const errorBody = await response.text();
                                lastError = `${model} failed (${response.status}) ${errorBody.slice(0, 160)}`;
                                await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 600));
                            }
                        }

                        throw new Error(lastError || "Cloud connection failed.");
                    };

                    const normalizeJsonText = (raw) => {
                        if (!raw) return "";
                        const trimmed = raw.trim();
                        if (trimmed.startsWith("```")) {
                            return trimmed.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
                        }
                        return trimmed;
                    };

                    const result = await callGemini();
                    const parts = result.candidates?.[0]?.content?.parts || [];
                    const textResponse = parts.map(p => p.text || '').join('\n').trim();
                    const cleanText = normalizeJsonText(textResponse);

                    if (!cleanText) throw new Error("AI returned empty data.");

                    const extracted = JSON.parse(cleanText);
                    const cleanedItems = Array.isArray(extracted.items)
                        ? extracted.items
                            .filter(item => item && (item.name || item.price))
                            .map(item => ({
                                name: item.name || 'Item',
                                price: Number(item.price) || 0,
                                category: item.category || extracted.category || 'Groceries'
                            }))
                        : [];

                    setFormData(prev => ({
                        ...prev,
                        description: extracted.description || prev.description,
                        amount: Number(extracted.amount) || prev.amount,
                        category: extracted.category || prev.category,
                        receiptUrl: downloadUrl,
                        shopName: extracted.shopName || extracted.description || prev.shopName,
                        lineItems: cleanedItems
                    }));

                } catch (err) {
                    console.error("Scanner Error:", err);
                    setErrorMsg(err.message || "Scanning timed out. Enter details below.");
                } finally {
                    setAiProcessing(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const db = firebase.firestore();
                const type = activeModal === 'deposit' ? 'deposit' : 'expense';
                const collectionName = type === 'expense' ? `transactions_${activeLedger}` : `deposits_${activeLedger}`;

                const data = {
                    date: formData.date,
                    description: formData.description,
                    amount: parseFloat(formData.amount) || 0,
                    category: formData.category,
                    shopName: formData.shopName,
                    contributor: formData.contributor,
                    targetBill: formData.targetBill,
                    receiptUrl: formData.receiptUrl,
                    ts: Date.now()
                };

                const doc = await db.collection(`artifacts/${appId}/public/data/${collectionName}`).add(data);

                if (formData.lineItems.length > 0) {
                    const batch = db.batch();
                    formData.lineItems.forEach(item => {
                        const ref = db.collection(`artifacts/${appId}/public/data/line_items_${activeLedger}`).doc();
                        batch.set(ref, {
                            ...item,
                            category: item.category || formData.category,
                            shopName: formData.shopName || formData.description,
                            transactionId: doc.id,
                            date: formData.date
                        });
                    });
                    await batch.commit();
                }

                setActiveModal(null);
                setFormData({ date: new Date().toISOString().split('T')[0], description: '', amount: '', category: 'Groceries', contributor: '', targetBill: '', receiptUrl: '', shopName: '', lineItems: [] });
            };


            const addUtilityBill = async (e) => {
                e.preventDefault();
                const db = firebase.firestore();
                const data = {
                    name: utilityForm.name || 'Utility Bill',
                    amount: Number(utilityForm.amount) || 0,
                    people: Math.max(1, Number(utilityForm.people) || 1),
                    paid: Number(utilityForm.paid) || 0,
                    dueDate: utilityForm.dueDate,
                    ts: Date.now()
                };
                await db.collection(`artifacts/${appId}/public/data/utility_bills_${activeLedger}`).add(data);
                setUtilityForm({ name: '', amount: '', people: '2', paid: '', dueDate: new Date().toISOString().split('T')[0] });
            };

            const addUtilityPayment = async (billId, amount) => {
                const payment = Number(amount);
                if (!payment) return;
                const db = firebase.firestore();
                const ref = db.collection(`artifacts/${appId}/public/data/utility_bills_${activeLedger}`).doc(billId);
                await db.runTransaction(async (tx) => {
                    const snap = await tx.get(ref);
                    if (!snap.exists) return;
                    const current = snap.data();
                    const nextPaid = (Number(current.paid) || 0) + payment;
                    tx.update(ref, { paid: nextPaid });
                });
            };

            const utilitySummary = React.useMemo(() => {
                const rows = utilityBills
                    .slice()
                    .sort((a, b) => new Date(a.dueDate || 0) - new Date(b.dueDate || 0))
                    .map(bill => {
                        const total = Number(bill.amount) || 0;
                        const paid = Number(bill.paid) || 0;
                        const people = Math.max(1, Number(bill.people) || 1);
                        const remaining = Math.max(0, total - paid);
                        return {
                            ...bill,
                            total,
                            paid,
                            people,
                            remaining,
                            sharePerPerson: total / people,
                            remainingPerPerson: remaining / people
                        };
                    });
                const totalRemaining = rows.reduce((acc, row) => acc + row.remaining, 0);
                return { rows, totalRemaining };
            }, [utilityBills]);

            const filteredHistory = React.useMemo(() => {
                const combined = [...transactions, ...deposits].sort((a,b) => new Date(b.date) - new Date(a.date));
                if (!searchTerm) return combined;
                return combined.filter(i => i.description?.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [transactions, deposits, searchTerm]);

            const availableShops = React.useMemo(() => {
                return [...new Set(transactions.map(t => t.shopName || t.description).filter(Boolean))].sort();
            }, [transactions]);

            const availableContributors = React.useMemo(() => {
                return [...new Set(transactions.map(t => t.contributor).filter(Boolean))].sort();
            }, [transactions]);

            const spendReport = React.useMemo(() => {
                const inDateRange = transactions.filter(t => {
                    if (!t.date) return false;
                    if (reportFilters.startDate && t.date < reportFilters.startDate) return false;
                    if (reportFilters.endDate && t.date > reportFilters.endDate) return false;
                    if (reportFilters.category !== 'all' && t.category !== reportFilters.category) return false;
                    const shop = t.shopName || t.description;
                    if (reportFilters.shop !== 'all' && shop !== reportFilters.shop) return false;
                    if (reportFilters.contributor !== 'all' && (t.contributor || 'Unknown') !== reportFilters.contributor) return false;
                    if (reportFilters.minAmount && Number(t.amount || 0) < Number(reportFilters.minAmount)) return false;
                    if (reportFilters.maxAmount && Number(t.amount || 0) > Number(reportFilters.maxAmount)) return false;
                    return true;
                });

                const totalSpend = inDateRange.reduce((acc, t) => acc + (Number(t.amount) || 0), 0);
                const categoryTotals = Object.entries(inDateRange.reduce((acc, t) => {
                    const key = t.category || 'Uncategorized';
                    acc[key] = (acc[key] || 0) + (Number(t.amount) || 0);
                    return acc;
                }, {})).sort((a, b) => b[1] - a[1]);

                const shopTotals = Object.entries(inDateRange.reduce((acc, t) => {
                    const key = t.shopName || t.description || 'Unknown Shop';
                    acc[key] = (acc[key] || 0) + (Number(t.amount) || 0);
                    return acc;
                }, {})).sort((a, b) => b[1] - a[1]);

                const txIds = new Set(inDateRange.map(t => t.id));
                const topItems = Object.entries(allLineItems.filter(li => txIds.has(li.transactionId)).reduce((acc, li) => {
                    const key = li.name || 'Unknown Item';
                    const existing = acc[key] || { spend: 0, count: 0 };
                    existing.spend += Number(li.price) || 0;
                    existing.count += 1;
                    acc[key] = existing;
                    return acc;
                }, {})).map(([name, value]) => ({ name, ...value })).sort((a, b) => b.spend - a.spend).slice(0, 8);

                const dailyTotals = Object.entries(inDateRange.reduce((acc, t) => {
                    acc[t.date] = (acc[t.date] || 0) + (Number(t.amount) || 0);
                    return acc;
                }, {})).sort((a, b) => new Date(a[0]) - new Date(b[0]));

                return { rows: inDateRange.sort((a,b)=>new Date(b.date)-new Date(a.date)), totalSpend, categoryTotals, shopTotals, topItems, dailyTotals };
            }, [transactions, allLineItems, reportFilters]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-indigo-600 uppercase tracking-tighter animate-pulse">Establishing Secure Link...</div>;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-[#fcfdfe]">
                    {/* Sidebar */}
                    <aside className="hidden md:flex flex-col w-72 bg-white border-r p-8 shrink-0">
                        <div className="text-xl font-black text-indigo-600 mb-10 italic tracking-tighter">HOUSEBANK.AI</div>
                        <nav className="space-y-1">
                            {['dashboard', 'ledger', 'analytics'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`w-full text-left p-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all ${view===v?'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-[1.02]':'text-slate-400 hover:text-indigo-600'}`}>{v}</button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 p-4 md:p-10 pb-32 max-w-5xl mx-auto w-full">

                        {!apiKey && (
                            <div className="mb-6 p-4 bg-amber-50 border border-amber-200 text-amber-800 rounded-2xl text-xs font-bold">
                                AI receipt scan needs a Gemini key. Open this deployed page with
                                <span className="font-black"> ?apiKey=YOUR_KEY </span>
                                (saved in this browser), e.g. <span className="font-black">.../index.html?apiKey=AIza...</span>
                            </div>
                        )}

                        <div className="flex bg-slate-100 p-1 rounded-2xl mb-8 w-fit shadow-inner">
                            {Object.values(LEDGERS).map(l => (
                                <button key={l} onClick={()=>setActiveLedger(l)} className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${activeLedger === l ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>
                                    {l.replace('_', ' ')}
                                </button>
                            ))}
                        </div>

                        {view === 'dashboard' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-end">
                                    <h1 className="text-3xl font-black text-slate-800 tracking-tight">Cloud Overview</h1>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setActiveModal('expense')} className="bg-indigo-600 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">+ Add Expense</button>
                                        <button onClick={()=>setActiveModal('deposit')} className="bg-emerald-600 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all active:scale-95">+ Add Credit</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] relative overflow-hidden group shadow-2xl">
                                        <div className="relative z-10">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Available Funds</div>
                                            <div className="text-4xl font-black tracking-tighter">${stats.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                                        </div>
                                        <div className="absolute -right-4 -bottom-4 text-9xl opacity-10 rotate-12 transition-transform group-hover:scale-125">💳</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Unpaid Liabilities</h3>
                                        <div className="space-y-4">
                                            {transactions.filter(t => stats.billProgress[t.id]?.remaining > 0).length === 0 ? <p className="text-xs text-slate-300 font-bold uppercase italic">All bills settled</p> :
                                            transactions.filter(t => stats.billProgress[t.id]?.remaining > 0).slice(0,3).map(t => (
                                                <div key={t.id} className="flex justify-between items-center group/item">
                                                    <span className="font-bold text-sm text-slate-700">{t.description}</span>
                                                    <span className="font-black text-indigo-600 text-sm group-hover/item:scale-110 transition-transform">${stats.billProgress[t.id].remaining.toFixed(2)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Utility Splitter</h3>
                                            <span className="text-xs font-black text-indigo-600">Remaining ${utilitySummary.totalRemaining.toFixed(2)}</span>
                                        </div>
                                        <form onSubmit={addUtilityBill} className="grid grid-cols-2 gap-3">
                                            <input className="col-span-2 p-3 bg-slate-50 rounded-xl font-bold text-sm" placeholder="Utility name (Electricity, Water...)" value={utilityForm.name} onChange={e=>setUtilityForm(prev=>({...prev, name:e.target.value}))} required />
                                            <input className="p-3 bg-slate-50 rounded-xl font-bold text-sm" type="number" step="0.01" placeholder="Total bill" value={utilityForm.amount} onChange={e=>setUtilityForm(prev=>({...prev, amount:e.target.value}))} required />
                                            <input className="p-3 bg-slate-50 rounded-xl font-bold text-sm" type="number" min="1" placeholder="People" value={utilityForm.people} onChange={e=>setUtilityForm(prev=>({...prev, people:e.target.value}))} required />
                                            <input className="p-3 bg-slate-50 rounded-xl font-bold text-sm" type="number" step="0.01" placeholder="Paid so far" value={utilityForm.paid} onChange={e=>setUtilityForm(prev=>({...prev, paid:e.target.value}))} />
                                            <input className="p-3 bg-slate-50 rounded-xl font-bold text-sm" type="date" value={utilityForm.dueDate} onChange={e=>setUtilityForm(prev=>({...prev, dueDate:e.target.value}))} />
                                            <button type="submit" className="col-span-2 bg-indigo-600 text-white py-3 rounded-xl font-black text-[10px] uppercase">Save Utility Bill</button>
                                        </form>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Utility Balances</h3>
                                        <div className="space-y-3 max-h-80 overflow-y-auto no-scrollbar">
                                            {!utilitySummary.rows.length && <p className="text-xs text-slate-300 font-bold uppercase italic">No utility bills yet</p>}
                                            {utilitySummary.rows.map(bill => (
                                                <div key={bill.id} className="p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <div className="font-black text-slate-800">{bill.name}</div>
                                                            <div className="text-[10px] uppercase font-bold text-slate-400">Due {bill.dueDate || 'N/A'} · {bill.people} people</div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="font-black text-indigo-600">${bill.remaining.toFixed(2)} left</div>
                                                            <div className="text-[10px] font-bold text-slate-400">${bill.remainingPerPerson.toFixed(2)} each</div>
                                                        </div>
                                                    </div>
                                                    <div className="mt-3 text-[11px] font-bold text-slate-500">Paid ${bill.paid.toFixed(2)} / ${bill.total.toFixed(2)} · Share ${bill.sharePerPerson.toFixed(2)} each</div>
                                                    <div className="mt-3 flex gap-2">
                                                        <button type="button" onClick={() => addUtilityPayment(bill.id, bill.sharePerPerson)} className="px-3 py-2 bg-emerald-100 text-emerald-700 rounded-lg text-[10px] font-black uppercase">+1 Share Paid</button>
                                                        <button type="button" onClick={() => addUtilityPayment(bill.id, bill.remaining)} className="px-3 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-[10px] font-black uppercase">Mark Settled</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : view === 'ledger' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h1 className="text-3xl font-black text-slate-800">Ledger</h1>
                                    <input type="text" placeholder="Search logs..." className="p-4 bg-white border rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-50 shadow-sm" onChange={e=>setSearchTerm(e.target.value)} />
                                </div>
                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    {filteredHistory.length === 0 ? <div className="p-20 text-center text-slate-300 font-bold uppercase tracking-widest">No entries found</div> :
                                    filteredHistory.map(item => (
                                        <div key={item.id} className="p-6 border-b last:border-0 flex justify-between items-center hover:bg-slate-50 transition-colors cursor-pointer group">
                                            <div>
                                                <div className="text-[10px] font-bold text-slate-400 uppercase">{item.date}</div>
                                                <div className="font-black text-slate-800 group-hover:text-indigo-600 transition-colors">{item.description}</div>
                                                <div className="text-[10px] font-bold text-indigo-500 uppercase">{item.type==='expense'?item.category:`From ${item.contributor}`}</div>
                                            </div>
                                            <div className={`font-black text-lg ${item.type==='expense'?'text-slate-900':'text-emerald-600'}`}>
                                                {item.type==='expense'?'-':'+'}${(item.amount || 0).toFixed(2)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <div className="max-w-2xl space-y-4">
                                    <h1 className="text-3xl font-black text-slate-800">Spend Reporting</h1>
                                    <div className="bg-white rounded-[2rem] border p-5 grid md:grid-cols-3 gap-3 shadow-sm">
                                        <Input label="Start Date" type="date" value={reportFilters.startDate} onChange={e=>setReportFilters(prev=>({...prev, startDate:e.target.value}))} />
                                        <Input label="End Date" type="date" value={reportFilters.endDate} onChange={e=>setReportFilters(prev=>({...prev, endDate:e.target.value}))} />
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Category</label>
                                            <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-0 focus:ring-4 focus:ring-indigo-50" value={reportFilters.category} onChange={e=>setReportFilters(prev=>({...prev, category:e.target.value}))}>
                                                <option value="all">All Categories</option>
                                                {CATEGORIES[activeLedger].map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Shop</label>
                                            <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-0 focus:ring-4 focus:ring-indigo-50" value={reportFilters.shop} onChange={e=>setReportFilters(prev=>({...prev, shop:e.target.value}))}>
                                                <option value="all">All Shops</option>
                                                {availableShops.map(shop => <option key={shop} value={shop}>{shop}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Contributor</label>
                                            <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-0 focus:ring-4 focus:ring-indigo-50" value={reportFilters.contributor} onChange={e=>setReportFilters(prev=>({...prev, contributor:e.target.value}))}>
                                                <option value="all">All Contributors</option>
                                                <option value="Unknown">Unknown</option>
                                                {availableContributors.map(name => <option key={name} value={name}>{name}</option>)}
                                            </select>
                                        </div>
                                        <Input label="Min Amount ($)" type="number" step="0.01" value={reportFilters.minAmount} onChange={e=>setReportFilters(prev=>({...prev, minAmount:e.target.value}))} />
                                        <Input label="Max Amount ($)" type="number" step="0.01" value={reportFilters.maxAmount} onChange={e=>setReportFilters(prev=>({...prev, maxAmount:e.target.value}))} />
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-4">
                                    <div className="bg-white border rounded-[2rem] p-6">
                                        <div className="text-[10px] uppercase font-black text-slate-400">Total Spend</div>
                                        <div className="text-3xl font-black text-slate-800">${spendReport.totalSpend.toFixed(2)}</div>
                                    </div>
                                    <div className="bg-white border rounded-[2rem] p-6">
                                        <div className="text-[10px] uppercase font-black text-slate-400">Transactions</div>
                                        <div className="text-3xl font-black text-slate-800">{spendReport.rows.length}</div>
                                    </div>
                                    <div className="bg-white border rounded-[2rem] p-6">
                                        <div className="text-[10px] uppercase font-black text-slate-400">Avg. Transaction</div>
                                        <div className="text-3xl font-black text-slate-800">${(spendReport.rows.length ? spendReport.totalSpend / spendReport.rows.length : 0).toFixed(2)}</div>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-4">
                                    <div className="bg-white border rounded-[2rem] p-6 space-y-3">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Spend by Category</h3>
                                        {spendReport.categoryTotals.map(([category, total]) => <div key={category} className="flex justify-between font-bold text-sm"><span>{category}</span><span className="text-indigo-600">${total.toFixed(2)}</span></div>)}
                                        {!spendReport.categoryTotals.length && <p className="text-[11px] text-slate-400 font-bold uppercase">No data for current filters</p>}
                                    </div>
                                    <div className="bg-white border rounded-[2rem] p-6 space-y-3">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Spend by Shop</h3>
                                        {spendReport.shopTotals.map(([shop, total]) => <div key={shop} className="flex justify-between font-bold text-sm"><span>{shop}</span><span className="text-indigo-600">${total.toFixed(2)}</span></div>)}
                                        {!spendReport.shopTotals.length && <p className="text-[11px] text-slate-400 font-bold uppercase">No data for current filters</p>}
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-4">
                                    <div className="bg-white border rounded-[2rem] p-6 space-y-3">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Daily Spend Totals</h3>
                                        {spendReport.dailyTotals.map(([day, total]) => <div key={day} className="flex justify-between font-bold text-sm"><span>{day}</span><span className="text-indigo-600">${total.toFixed(2)}</span></div>)}
                                        {!spendReport.dailyTotals.length && <p className="text-[11px] text-slate-400 font-bold uppercase">No data for current filters</p>}
                                    </div>
                                    <div className="bg-white border rounded-[2rem] p-6 space-y-3">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Top Receipt Items</h3>
                                        {spendReport.topItems.map(item => <div key={item.name} className="flex justify-between font-bold text-sm"><span>{item.name} <span className="text-[10px] text-slate-400">({item.count}x)</span></span><span className="text-indigo-600">${item.spend.toFixed(2)}</span></div>)}
                                        {!spendReport.topItems.length && <p className="text-[11px] text-slate-400 font-bold uppercase">Scan receipts to see item detail</p>}
                                    </div>
                                </div>

                                <div className="max-w-md">
                                    <h2 className="text-2xl font-black text-slate-800">Item Price Tracking</h2>
                                    <input type="text" placeholder="Type an item (Milk, Eggs...)" className="w-full mt-4 p-5 bg-white border-2 border-slate-100 rounded-[2rem] font-bold shadow-lg focus:border-indigo-500 transition-all outline-none" value={searchItem} onChange={e=>setSearchItem(e.target.value)} />
                                </div>

                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    <div className="px-6 py-4 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">Detailed Transactions</div>
                                    {spendReport.rows.map(item => (
                                        <div key={item.id} className="p-5 border-b last:border-0 flex justify-between items-center">
                                            <div>
                                                <div className="text-[10px] uppercase font-bold text-slate-400">{item.date} · {item.shopName || item.description}</div>
                                                <div className="font-black text-slate-800">{item.description}</div>
                                                <div className="text-[10px] uppercase font-bold text-indigo-500">{item.category}</div>
                                            </div>
                                            <div className="font-black text-slate-900">${(item.amount || 0).toFixed(2)}</div>
                                        </div>
                                    ))}
                                    {!spendReport.rows.length && <div className="p-12 text-center text-slate-300 font-bold uppercase tracking-widest">No transactions in selected range</div>}
                                </div>

                                {searchItem && (
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm animate-in fade-in slide-in-from-bottom-4">
                                        <h3 className="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">Price Evolution</h3>
                                        <div className="space-y-4">
                                            {allLineItems.filter(i => (i.name || '').toLowerCase().includes(searchItem.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date)).map((li, idx) => (
                                                <div key={idx} className="flex justify-between border-b border-slate-50 pb-4 last:border-0">
                                                    <span className="font-bold text-slate-700">{li.name} <span className="text-[10px] text-slate-400 font-normal ml-2">{li.date}</span></span>
                                                    <span className="font-black text-indigo-600">${Number(li.price).toFixed(2)}</span>
                                                </div>
                                            ))}
                                            {allLineItems.filter(i => (i.name || '').toLowerCase().includes(searchItem.toLowerCase())).length === 0 && <p className="text-center py-4 text-slate-300 font-bold uppercase text-[10px]">No historical matches</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Nav Mobile */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t p-4 flex justify-around md:hidden z-40 pb-10">
                        {['dashboard', 'ledger', 'analytics'].map(v => (
                            <button key={v} onClick={()=>setView(v)} className={`text-[10px] font-black uppercase tracking-widest ${view===v?'text-indigo-600':'text-slate-400'}`}>{v}</button>
                        ))}
                    </nav>

                    {/* Modal */}
                    {activeModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <form onSubmit={handleSubmit} className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 space-y-6 shadow-2xl my-auto relative animate-in zoom-in duration-200">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-black uppercase tracking-tighter text-slate-800">{activeModal}</h2>
                                    <button type="button" onClick={()=>setActiveModal(null)} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-full text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all">✕</button>
                                </div>

                                {activeModal === 'expense' && (
                                    <div className={`group relative h-40 rounded-[2rem] border-4 border-dashed flex flex-col items-center justify-center transition-all ${aiProcessing?'animate-scan border-indigo-500 bg-indigo-50/50':'border-slate-100 bg-slate-50 hover:border-indigo-400 hover:bg-white cursor-pointer'}`}>
                                        <input type="file" onChange={e => runAiScanner(e.target.files[0])} className="absolute inset-0 opacity-0 cursor-pointer z-10" accept="image/*" disabled={aiProcessing} />
                                        <div className="text-center pointer-events-none p-4">
                                            <div className={`text-base font-black uppercase tracking-tight transition-colors ${aiProcessing ? "text-indigo-600" : "text-slate-400 group-hover:text-indigo-600"}`}>
                                                {aiProcessing ? "AI Scanning... (Don't Close)" : "📸 SNAP & SCAN"}
                                            </div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mt-2">Automatic Price & Store Detection</p>
                                        </div>
                                    </div>
                                )}

                                {errorMsg && <div className="p-5 bg-red-50 border border-red-100 text-red-600 text-[11px] font-bold rounded-2xl shake flex items-center gap-3">
                                    <span className="text-lg">⚠️</span> {errorMsg}
                                </div>}

                                <div className="grid grid-cols-2 gap-4">
                                    <Input label="Date" type="date" value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} />
                                    <Input label="Grand Total ($)" type="number" step="0.01" value={formData.amount} onChange={e=>setFormData({...formData, amount:e.target.value})} required />
                                </div>
                                <Input label="Merchant / Description" placeholder="Where did you spend?" value={formData.description} onChange={e=>setFormData({...formData, description:e.target.value})} required />
                                {activeModal === 'expense' && <Input label="Shop Name" placeholder="Store / supermarket" value={formData.shopName} onChange={e=>setFormData({...formData, shopName:e.target.value})} />}

                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">
                                        {activeModal === 'expense' ? 'Category' : 'Source'}
                                    </label>
                                    {activeModal === 'expense' ? (
                                        <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-0 focus:ring-4 focus:ring-indigo-50 appearance-none" value={formData.category} onChange={e=>setFormData({...formData, category:e.target.value})}>
                                            {CATEGORIES[activeLedger].map(c => <option key={c}>{c}</option>)}
                                        </select>
                                    ) : (
                                        <input className="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none border-0 focus:ring-4 focus:ring-indigo-50" placeholder="Who paid?" value={formData.contributor} onChange={e=>setFormData({...formData, contributor:e.target.value})} />
                                    )}
                                </div>

                                {formData.lineItems.length > 0 && (
                                    <div className="p-6 bg-slate-50 rounded-[2rem] space-y-3 max-h-48 overflow-y-auto no-scrollbar border border-slate-100">
                                        <div className="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-[0.2em] border-b pb-2 flex justify-between">
                                            <span>AI Detected Items</span>
                                            <span className="text-indigo-600">{formData.lineItems.length} items</span>
                                        </div>
                                        {formData.lineItems.map((li, i) => (
                                            <div key={i} className="flex justify-between text-[11px] font-bold text-slate-600 animate-in slide-in-from-left-2" style={{animationDelay: `${i*50}ms`}}>
                                                <span className="truncate pr-4">{li.name}</span>
                                                <span className="text-indigo-600 font-black">${Number(li.price).toFixed(2)}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <button type="submit" disabled={aiProcessing} className={`w-full py-6 text-white rounded-[2.5rem] font-black uppercase text-sm tracking-widest shadow-2xl transition-all ${aiProcessing ? 'bg-slate-300 cursor-not-allowed grayscale' : 'bg-indigo-600 shadow-indigo-200 hover:bg-indigo-700 hover:translate-y-[-2px] active:scale-95'}`}>
                                    {aiProcessing ? 'Processing...' : 'Securely Commit'}
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const Input = ({ label, ...props }) => (
            <div className="space-y-1">
                <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">{label}</label>
                <input className="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none border-0 focus:ring-4 focus:ring-indigo-50 transition-all placeholder:text-slate-300 text-slate-800" {...props} />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
